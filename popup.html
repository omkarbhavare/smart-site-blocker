<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Site Blocker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0c0c14;
      --surface:  #13131e;
      --surface2: #1a1a28;
      --border:   #252538;
      --accent:   #7c6af7;
      --accent2:  #e5533d;
      --text:     #e0e0f0;
      --muted:    #6666880;
      --green:    #4caf88;
      --radius:   10px;
      --font:     'Segoe UI', system-ui, sans-serif;
    }

    body {
      width: 340px;
      min-height: 400px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.3px;
      color: var(--text);
    }

    .logo svg { flex-shrink: 0; }

    /* Toggle switch */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #666880;
      text-transform: uppercase;
    }

    .toggle {
      position: relative;
      width: 38px;
      height: 22px;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      inset: 0;
      background: #333345;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      left: 3px;
      top: 3px;
      width: 16px;
      height: 16px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    input:checked + .slider { background: var(--accent); }
    input:checked + .slider::before { transform: translateX(16px); }

    /* Stats row */
    .stats {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(124,106,247,0.06);
      border-bottom: 1px solid var(--border);
    }

    .stat-icon {
      width: 34px;
      height: 34px;
      background: rgba(124,106,247,0.12);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .stat-text { line-height: 1.2; }

    .stat-number {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }

    .stat-desc {
      font-size: 11px;
      color: #666880;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Section */
    .section {
      padding: 14px 16px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666880;
    }

    /* Add keyword input */
    .add-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    .input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 7px 10px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    .input:focus { border-color: var(--accent); }
    .input::placeholder { color: #444458; }

    .btn-add {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 7px;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .btn-add:hover { background: #8f7fff; }

    /* Keyword list */
    .keyword-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 160px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }

    .keyword-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      animation: fadeIn 0.15s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .keyword-text {
      font-size: 12px;
      color: #b0b0cc;
      font-family: 'Courier New', monospace;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: #444460;
      font-size: 16px;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
      transition: color 0.15s;
    }

    .btn-remove:hover { color: var(--accent2); }

    .empty-state {
      font-size: 12px;
      color: #444458;
      text-align: center;
      padding: 12px;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 16px;
    }

    /* Footer */
    .footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: center;
    }

    .options-link {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      font-family: var(--font);
      transition: color 0.15s;
    }

    .options-link:hover { color: #9d8fff; }

    /* Lock countdown */
    .lock-row {
      padding: 7px 16px;
      background: rgba(139,32,32,0.18);
      border-bottom: 1px solid rgba(200,60,60,0.2);
      font-size: 11px;
      color: #cc7070;
      font-weight: 600;
      letter-spacing: 0.4px;
      font-variant-numeric: tabular-nums;
      text-align: center;
      transition: background 0.3s, color 0.3s;
    }

    .lock-row.unlocked {
      background: rgba(32,100,60,0.18);
      border-bottom-color: rgba(60,160,100,0.2);
      color: #60c080;
    }

    .btn-remove:disabled {
      opacity: 0.2;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L4 5V11C4 15.5 7.4 19.7 12 21C16.6 19.7 20 15.5 20 11V5L12 2Z"
          fill="rgba(124,106,247,0.2)" stroke="rgba(124,106,247,0.8)" stroke-width="1.5"/>
        <path d="M9 12L11 14L15 10" stroke="#7c6af7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Smart Site Blocker
    </div>
    
  </div>

  <div class="stats">
    <div class="stat-icon">🛡</div>
    <div class="stat-text">
      <div class="stat-number" id="blockedCount">0</div>
      <div class="stat-desc">Sites Blocked</div>
    </div>
  </div>

  <div class="lock-row" id="lockCountdown">🔒 Removal locked — 20:00</div>

  <div class="section">
    <div class="section-header">
      <span class="section-title">Keywords</span>
    </div>

    <div class="add-row">
      <input class="input" type="text" id="newKeyword" placeholder="Add keyword…" maxlength="60">
      <button class="btn-add" id="addBtn">Add</button>
    </div>
  </div>

  <div class="footer">
    <button class="options-link" id="optionsLink">⚙ Full Settings</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
